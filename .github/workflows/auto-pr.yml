name: Auto Create PR from branch_test2

on:
  push:
    branches:
      - branch_test2

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 既存のオープンPRを確認
          PR_COUNT=$(gh pr list \
            --base main \
            --head branch_test2 \
            --state open \
            --json number \
            --jq 'length')

          if [ "$PR_COUNT" -eq 0 ]; then
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            gh pr create \
              --title "[Auto PR] branch_test2 への変更: ${TIMESTAMP}" \
              --body "## 自動作成されたプルリクエスト

このPRは \`branch_test2\` ブランチへのプッシュにより自動作成されました。

- **ソースブランチ:** \`branch_test2\`
- **マージ先:** \`main\`
- **トリガー:** ${{ github.actor }} によるプッシュ
- **コミット:** ${{ github.sha }}
" \
              --base main \
              --head branch_test2
            echo "PR created successfully."
          else
            echo "PR already exists for branch_test2, skipping creation."
          fi
